# ima-goose Developer Configuration Template
# Copy to: ~/.config/goose/config.yaml
# Set all PLACEHOLDER values before use
# Last updated: 2026-05-18

extensions:
  # ── Core platform extensions (always enabled) ──

  developer:
    enabled: true
    type: platform
    name: developer
    description: Write and edit files, and execute shell commands
    display_name: Developer
    bundled: true

  summon:
    enabled: true
    type: platform
    name: summon
    description: Load knowledge and delegate tasks to subagents
    display_name: Summon
    bundled: true
    # Auto-discovers SKILL.md files from ~/.agents/skills/ (Goose v1.25+)

  tom:
    enabled: true
    type: platform
    name: tom
    description: Inject MOIM/persistent instructions into every turn
    display_name: Top Of Mind
    bundled: true

  todo:
    enabled: true
    type: platform
    name: todo
    description: Manage structured task lists during complex workflows
    display_name: Todo
    bundled: true

  orchestrator:
    enabled: true
    type: platform
    name: orchestrator
    description: Manage agent sessions — list, view, start, send messages, interrupt, stop
    display_name: Orchestrator
    bundled: true

  chatrecall:
    enabled: true
    type: platform
    name: chatrecall
    description: Search past conversations and load session summaries for contextual memory
    display_name: Chat Recall
    bundled: true
    # Session memory — replaces Vestige/Qdrant/Serena memory stack for Goose workflows

  # ── MCP Extensions ──

  # Tavily — web search and research
  # API key: https://tavily.com (free tier available)
  tavily:
    enabled: true
    name: tavily
    type: stdio
    cmd: npx
    args: ["-y", "tavily-mcp@latest"]
    env_keys: ["TAVILY_API_KEY"]
    timeout: 60

  # Context7 — official library documentation (no API key required)
  context7:
    enabled: true
    name: context7
    type: stdio
    cmd: npx
    args: ["-y", "@upstash/context7-mcp@latest"]
    timeout: 60

  # Sequential Thinking — structured reasoning for complex problems (no API key required)
  sequential-thinking:
    enabled: true
    name: sequential-thinking
    type: stdio
    cmd: npx
    args: ["-y", "@modelcontextprotocol/server-sequential-thinking@latest"]
    timeout: 300

  # Serena — JetBrains-powered code navigation (saves 40-70% tokens vs reading files)
  # Requires: JetBrains IDE running with Serena MCP plugin + uvx installed
  # Plugin: https://plugins.jetbrains.com/plugin/27337-serena-mcp
  serena:
    enabled: true
    name: serena
    type: stdio
    cmd: uvx
    args:
      - "--from"
      - "git+https://github.com/oraios/serena"
      - "serena"
      - "start-mcp-server"
      - "--context=claude-code"
      - "--language-backend"
      - "JetBrains"
      - "--project-from-cwd"
    timeout: 300

  # Fetch — retrieve and convert URL content for analysis
  fetch:
    enabled: true
    name: fetch
    type: stdio
    cmd: uvx
    args: ["mcp-server-fetch"]
    timeout: 60

  # Chrome DevTools — browser inspection and debugging through Chrome
  chrome-devtools:
    enabled: true
    name: chrome-devtools
    type: stdio
    cmd: npx
    args: ["-y", "chrome-devtools-mcp@latest"]
    timeout: 60

  # Qdrant Memory — permanent semantic knowledge library
  # Requires: qdrant-mcp on PATH and Qdrant running at QDRANT_URL
  qdrant-memory:
    enabled: true
    name: qdrant-memory
    type: stdio
    cmd: qdrant-mcp
    args: []
    envs:
      QDRANT_URL: "http://localhost:6333"
      COLLECTION_NAME: "ima-knowledge"
    timeout: 60

  # Vestige — cognitive memory with search, decisions, preferences, and intentions
  # Requires: vestige-mcp on PATH
  vestige:
    enabled: true
    name: vestige
    type: stdio
    cmd: vestige-mcp
    args: []
    timeout: 60

  # Atlassian — Jira, Confluence, Compass, and Rovo search
  # Complete the browser OAuth flow on first use. Do not use the old SSE
  # endpoint: https://mcp.atlassian.com/v1/sse
  atlassian-rovo:
    enabled: true
    type: streamable_http
    name: atlassian-rovo
    description: Atlassian Rovo MCP
    uri: https://mcp.atlassian.com/v1/mcp/authv2
    envs: {}
    env_keys: []
    headers: {}
    timeout: 300
    socket: null
    bundled: null
    available_tools: []

  # If native remote OAuth fails locally, add a Command-line Extension instead:
  # npx -y mcp-remote@latest https://mcp.atlassian.com/v1/mcp/authv2
  #
  # Keep the mcp-atlassian skill's REST API helper configured with
  # ATLASSIAN_BEARER_TOKEN/CLOUD_ID or ATLASSIAN_EMAIL/API_TOKEN for scripted
  # Jira/Confluence workflow operations and fallback access.

# ── Global settings ──
GOOSE_MODE: auto
GOOSE_MAX_TURNS: 1000

# ── Custom slash commands ──
# Use inside any interactive Goose session:
#   /serena-bootstrap
#   /serena-memorize Our design source lives at ./claude-design
slash_commands:
  - command: "serena-bootstrap"
    recipe_path: "/home/YOUR_USER/.config/goose/recipes/serena-bootstrap.yaml"
  - command: "serena-memorize"
    recipe_path: "/home/YOUR_USER/.config/goose/recipes/serena-memorize.yaml"

# ── Provider (choose one) ──
#
# Recipes pin a tier (opus/sonnet/haiku) and the installer rewrites those to
# provider-specific model IDs based on the chosen --profile. See docs/MODEL-TIERS.md.
# Switching provider here = also run: node scripts/install.ts --profile <name>

# Option A: claude-acp (default — uses Claude Pro/Max subscription auth)
GOOSE_PROVIDER: claude-acp
GOOSE_MODEL: "sonnet"
# Installer profile: claude-acp (default). Recipes keep friendly shortnames.

# Option B: codex-acp (OpenAI via ChatGPT Pro/Max subscription auth)
# GOOSE_PROVIDER: codex-acp
# GOOSE_MODEL: "gpt-5.5/medium"
# Installer profile: openai. Rewrites opus→gpt-5.5/high, sonnet→gpt-5.5/medium, haiku→gpt-5.5/low.
# Both ACPs can coexist — both are installed per README.
#
# Hybrid installer profile: hybrid. Writes per-recipe providers:
# opus→codex-acp/gpt-5.5/high, sonnet→claude-acp/sonnet, haiku→claude-acp/haiku.
# Install both ACP binaries before using this profile.

# Option C: Anthropic direct API (per-token billing)
# GOOSE_PROVIDER: anthropic
# GOOSE_MODEL: "claude-sonnet-4-6"
# Installer profile: anthropic. Rewrites to full claude-* IDs.
# Add ANTHROPIC_API_KEY to your shell profile.

# Option D: OpenRouter (multi-provider gateway — ~$0.003/session for Claude Sonnet)
# GOOSE_PROVIDER: openrouter
# GOOSE_MODEL: "anthropic/claude-sonnet-4-5"
# No matching installer profile yet — edit profiles/openrouter.yaml if needed.
# Add OPENROUTER_API_KEY to your shell profile.

# Option E: RunPod vLLM (production — self-hosted, lower cost at scale)
# GOOSE_PROVIDER: runpod_vllm
# GOOSE_MODEL: "RedHatAI/Qwen3-Coder-Next-NVFP4"
# Add RUNPOD_API_KEY and RUNPOD_ENDPOINT_ID to your shell profile
