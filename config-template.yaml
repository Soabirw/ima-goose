# ima-goose Developer Configuration Template
# Reference for: ~/.config/goose/config.yaml
# Do not copy over an existing config. Merge needed sections manually.
# Set all PLACEHOLDER values before use
# Last updated: 2026-06-12

extensions:
  # ── Core platform extensions (always enabled) ──

  developer:
    enabled: true
    type: platform
    name: developer
    description: Write and edit files, and execute shell commands
    display_name: Developer
    bundled: true

  summon:
    enabled: true
    type: platform
    name: summon
    description: Load knowledge and delegate tasks to subagents
    display_name: Summon
    bundled: true
    # Auto-discovers SKILL.md files from ~/.agents/skills/ (Goose v1.25+)

  tom:
    enabled: true
    type: platform
    name: tom
    description: Inject MOIM/persistent instructions into every turn
    display_name: Top Of Mind
    bundled: true

  todo:
    enabled: true
    type: platform
    name: todo
    description: Manage structured task lists during complex workflows
    display_name: Todo
    bundled: true

  orchestrator:
    enabled: true
    type: platform
    name: orchestrator
    description: Manage agent sessions — list, view, start, send messages, interrupt, stop
    display_name: Orchestrator
    bundled: true

  summarize:
    enabled: true
    type: platform
    name: summarize
    description: Load files/directories and get an LLM summary in a single call
    display_name: Summarize
    bundled: true

  apps:
    enabled: true
    type: platform
    name: apps
    description: Create and iterate small local apps during design/prototyping sessions
    display_name: Apps
    bundled: true

  code_execution:
    enabled: true
    type: platform
    name: code_execution
    description: Execute code snippets in supported sandboxed runtimes
    display_name: Code Mode
    bundled: true

  analyze:
    enabled: true
    type: platform
    name: analyze
    description: Analyze source trees, symbols, and call graphs
    display_name: Analyze
    bundled: true

  extensionmanager:
    enabled: true
    type: platform
    name: Extension Manager
    description: Search, install, and manage Goose extensions
    display_name: Extension Manager
    bundled: true

  skills:
    enabled: true
    type: platform
    name: skills
    description: Discover and provide skill instructions from filesystem and builtins
    display_name: Skills
    bundled: true

  chatrecall:
    enabled: true
    type: platform
    name: chatrecall
    description: Search past conversations and load session summaries for contextual memory
    display_name: Chat Recall
    bundled: true
    # Session memory — replaces Vestige/Qdrant/Serena memory stack for Goose workflows

  # ── MCP Extensions ──

  # Tavily — web search and research
  # API key: https://tavily.com (free tier available)
  tavily:
    enabled: true
    name: tavily
    type: stdio
    cmd: npx
    args: ["-y", "tavily-mcp@latest"]
    env_keys: ["TAVILY_API_KEY"]
    timeout: 60

  # Context7 — official library documentation (no API key required)
  context7:
    enabled: true
    name: context7
    type: stdio
    cmd: npx
    args: ["-y", "@upstash/context7-mcp@latest"]
    timeout: 60

  # Sequential Thinking — structured reasoning for complex problems (no API key required)
  sequential-thinking:
    enabled: true
    name: sequential-thinking
    type: stdio
    cmd: npx
    args: ["-y", "@modelcontextprotocol/server-sequential-thinking@latest"]
    timeout: 300

  # Fetch — retrieve and convert URL content for analysis
  fetch:
    enabled: true
    name: fetch
    type: stdio
    cmd: uvx
    args: ["mcp-server-fetch"]
    timeout: 60

  # Chrome DevTools — browser inspection and debugging through Chrome
  chrome-devtools:
    enabled: true
    name: chrome-devtools
    type: stdio
    cmd: npx
    args: ["-y", "chrome-devtools-mcp@latest"]
    timeout: 60

  # Atlassian — Jira, Confluence, Compass, and Rovo search
  # Complete the browser OAuth flow on first use. Do not use the old SSE
  # endpoint: https://mcp.atlassian.com/v1/sse
  atlassian-rovo:
    enabled: true
    type: streamable_http
    name: atlassian-rovo
    description: Atlassian Rovo MCP
    uri: https://mcp.atlassian.com/v1/mcp/authv2
    envs: {}
    env_keys: []
    headers: {}
    timeout: 300
    socket: null
    bundled: null
    available_tools: []

  # If native remote OAuth fails locally, add a Command-line Extension instead:
  # npx -y mcp-remote@latest https://mcp.atlassian.com/v1/mcp/authv2
  #
  # Keep the mcp-atlassian skill's REST API helper configured for scripted
  # Jira/Confluence workflow operations and fallback access. Required vars:
  #   ATLASSIAN_DOMAIN=your-site.atlassian.net
  #   ATLASSIAN_CLOUD_ID=your-cloud-id
  #   ATLASSIAN_BEARER_TOKEN=your-api-token
  #   ATLASSIAN_EMAIL=you@example.com
  #   ATLASSIAN_API_TOKEN=$ATLASSIAN_BEARER_TOKEN
  # ATLASSIAN_API_TOKEN and ATLASSIAN_BEARER_TOKEN are the same value. Keep
  # real values in your shell/secrets manager, not in this template.

# ── Global settings ──
GOOSE_MODE: auto
GOOSE_MAX_TURNS: 1000

# ── Custom slash commands ──
# Use inside any interactive Goose session:
#   /architect
#   /prompt-starter
#   /preflight
#   /serena-bootstrap
#   /bootstrap-serena
#   /vestige-bootstrap
#   /bootstrap-vestige
#   /serena-memorize Our design source lives at ./claude-design
slash_commands:
  - command: "architect"
    recipe_path: "/home/YOUR_USER/.config/goose/recipes/architect.yaml"
  - command: "prompt-starter"
    recipe_path: "/home/YOUR_USER/.config/goose/recipes/prompt-starter.yaml"
  - command: "preflight"
    recipe_path: "/home/YOUR_USER/.config/goose/recipes/preflight-check.yaml"
  - command: "serena-bootstrap"
    recipe_path: "/home/YOUR_USER/.config/goose/recipes/serena-bootstrap.yaml"
  - command: "bootstrap-serena"
    recipe_path: "/home/YOUR_USER/.config/goose/recipes/serena-bootstrap.yaml"
  - command: "vestige-bootstrap"
    recipe_path: "/home/YOUR_USER/.config/goose/recipes/vestige-bootstrap.yaml"
  - command: "bootstrap-vestige"
    recipe_path: "/home/YOUR_USER/.config/goose/recipes/vestige-bootstrap.yaml"
  - command: "serena-memorize"
    recipe_path: "/home/YOUR_USER/.config/goose/recipes/serena-memorize.yaml"

# ── Provider (choose one) ──
#
# Recipes pin a tier (high/mid/low) and the installer rewrites those to
# provider-specific model IDs based on the chosen --profile. See docs/MODEL-TIERS.md.
# Switching provider here = also run: node scripts/install.ts --profile <name>

# Option A: codex-acp (default — OpenAI via ChatGPT Pro/Max subscription auth)
GOOSE_PROVIDER: codex-acp
GOOSE_MODEL: "gpt-5.5/medium"
# Installer profile: openai (default). Renders HIGH→gpt-5.5/high,
# MID→gpt-5.5/medium, LOW→gpt-5.5/low.

# Option B: chatgpt_codex (native ChatGPT Codex provider)
# GOOSE_PROVIDER: chatgpt_codex
# GOOSE_MODEL: "gpt-5.5"
# GOOSE_THINKING_EFFORT: "high"
# Installer profile: chatgpt_codex. Renders HIGH/MID/LOW to gpt-5.5.

# Option C: claude-acp (Claude subscription auth, if working locally)
# GOOSE_PROVIDER: claude-acp
# GOOSE_MODEL: "sonnet"
# Installer profile: claude-acp. Renders HIGH→opus, MID→sonnet, LOW→haiku.
#
# Hybrid installer profile: hybrid. Writes per-recipe providers:
# HIGH→codex-acp/gpt-5.5/high, MID→claude-acp/sonnet, LOW→claude-acp/haiku.
# Install both ACP binaries before using this profile.

# Option D: Anthropic direct API (per-token billing)
# GOOSE_PROVIDER: anthropic
# GOOSE_MODEL: "claude-sonnet-4-6"
# Installer profile: anthropic. Renders HIGH/MID/LOW to full claude-* IDs.
# Add ANTHROPIC_API_KEY to your shell profile.

# Option E: OpenRouter (multi-provider gateway — ~$0.003/session for Claude Sonnet)
# GOOSE_PROVIDER: openrouter
# GOOSE_MODEL: "anthropic/claude-sonnet-4-5"
# No matching installer profile yet — edit profiles/openrouter.yaml if needed.
# Add OPENROUTER_API_KEY to your shell profile.

# Option F: RunPod vLLM (production — self-hosted, lower cost at scale)
# GOOSE_PROVIDER: runpod_vllm
# GOOSE_MODEL: "RedHatAI/Qwen3-Coder-Next-NVFP4"
# Add RUNPOD_API_KEY and RUNPOD_ENDPOINT_ID to your shell profile
