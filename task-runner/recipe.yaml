version: "1.3.0"
title: "Task Runner"
description: "Execute pre-decomposed task specs from task-planner. Implements code, delegates tests and review."

# Sonnet for execution — task spec is already decomposed; less interpretation needed.
settings:
  goose_model: "sonnet"
  temperature: 0.3
  max_turns: 25

extensions:
  - type: builtin
    name: developer
  - type: builtin
    name: summon       # auto-discovers skills on demand

  - type: stdio
    name: serena
    cmd: uvx
    args:
      - "--from"
      - "git+https://github.com/oraios/serena"
      - "serena"
      - "start-mcp-server"
      - "--context=claude-code"
      - "--language-backend"
      - "JetBrains"
      - "--project-from-cwd"
    timeout: 300
  - type: stdio
    name: vestige
    cmd: vestige-mcp
    args: []
    timeout: 60
  - type: stdio
    name: qdrant-memory
    cmd: qdrant-mcp
    args: []
    env_keys:
      - QDRANT_URL
      - COLLECTION_NAME
    timeout: 60
  - type: stdio
    name: tavily
    cmd: npx
    args: ["-y", "tavily-mcp@latest"]
    env_keys:
      - TAVILY_API_KEY
    timeout: 60
  - type: stdio
    name: sequential-thinking
    cmd: npx
    args: ["-y", "@modelcontextprotocol/server-sequential-thinking@latest"]
    timeout: 300
  - type: stdio
    name: context7
    cmd: npx
    args: ["-y", "@upstash/context7-mcp@latest"]
    timeout: 60
  - type: platform
    name: tom
  - type: platform
    name: todo
  - type: platform
    name: code_execution
# Assumes input is a detailed task spec from task-planner.
sub_recipes:
  - name: write_tests
    path: ../test-writer/recipe.yaml
  - name: code_review
    path: ../code-review/recipe.yaml

instructions: |
  You are The Task Runner. You execute implementation plans produced by task-planner.
  Practitioner anchor: see MOIM. "We" not "I". Simple > Complex.

  IMPORTANT: You assume the task spec is already fully decomposed. Less interpretation,
  more execution. If the spec is ambiguous, ask ONE clarifying question before proceeding.

  ## How to Work

  Load these skills as the task surfaces them:
  - functional-programmer  — pure core / impure shell discipline
  - mcp-serena              — navigate existing codebase before writing new code
  - Language skill matching the task: js-fp | php-fp | php-fp-wordpress | py-fp | ruby-fp

  ## Execution Steps

  1. Read the task spec (paths, signatures, acceptance criteria, security context).
  2. Navigate the codebase with mcp-serena — find existing patterns before writing.
  3. Implement according to spec: pure functions at core, side effects at shell.
  4. After implementation: call `write_tests` sub-recipe with file paths + acceptance criteria.
  5. After tests pass: call `code_review` sub-recipe with PR number or diff path.
  6. Report: files changed, functions implemented, test coverage, issues, next steps.

  ## Delegation Briefs (sub-recipe tool calls must be self-contained)
  Include: file paths, acceptance criteria, security context, language/framework.
  Never say "as discussed" — the sub-agent has no memory of this session.

  ## Security (WordPress tasks — NON-NEGOTIABLE)
  - Nonce verification on all AJAX endpoints
  - Capability checks on all endpoints
  - Prepared statements for all DB queries
  - Input sanitization at boundaries; output escaping in context
  - declare(strict_types=1) in PHP files

parameters:
  - key: task_spec
    input_type: string
    requirement: optional
    default: ""
    description: "Optional. Task spec from task-planner (YAML or markdown), Serena memory, local file path, or direct task description. Leave blank to enter open task-runner mode."

prompt: |
  {% if task_spec %}{{ task_spec }}{% else %}Open task-runner mode. Greet briefly and ask the user for the task spec, Serena memory name, local file path, or direct task description to execute. Do NOT inspect files, implement, or call subrecipes before the user answers — wait for their input first.{% endif %}

activities:
  - "Implement this task spec and delegate tests via write_tests"
  - "Execute the task plan and run a code review when done"
  - "Implement the pure functions defined in this spec"
  - "Run this task to completion: implement, test, review"
