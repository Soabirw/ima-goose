version: "1.6.2"
title: "Task Runner"
description: "Execute pre-decomposed task specs from task-planner. Implements code, delegates tests and review."

# Sonnet for execution — task spec is already decomposed; less interpretation needed.
settings:
  goose_model: "sonnet"
  temperature: 0.3
  max_turns: 25

extensions:
  - type: builtin
    name: developer
  - type: builtin
    name: summon       # auto-discovers skills on demand

  - type: stdio
    name: serena
    cmd: uvx
    args:
      - "--from"
      - "git+https://github.com/oraios/serena"
      - "serena"
      - "start-mcp-server"
      - "--context=claude-code"
      - "--language-backend"
      - "JetBrains"
      - "--project-from-cwd"
    timeout: 300
  - type: stdio
    name: vestige
    cmd: vestige-mcp
    args: []
    timeout: 60
  - type: stdio
    name: qdrant-memory
    cmd: qdrant-mcp
    args: []
    env_keys:
      - QDRANT_URL
      - COLLECTION_NAME
    timeout: 60
  - type: stdio
    name: tavily
    cmd: npx
    args: ["-y", "tavily-mcp@latest"]
    env_keys:
      - TAVILY_API_KEY
    timeout: 60
  - type: stdio
    name: sequential-thinking
    cmd: npx
    args: ["-y", "@modelcontextprotocol/server-sequential-thinking@latest"]
    timeout: 300
  - type: stdio
    name: context7
    cmd: npx
    args: ["-y", "@upstash/context7-mcp@latest"]
    timeout: 60
  - type: platform
    name: tom
  - type: platform
    name: todo
  - type: platform
    name: code_execution
# Assumes input is a detailed task spec from task-planner.
sub_recipes:
  - name: write_tests
    path: ../test-writer/recipe.yaml
  - name: code_review
    path: ../code-review/recipe.yaml

instructions: |
  ## Serena Project Memory Bootstrap

  At session start, before greeting, interpreting the prompt, or using any
  other tool, the first tool action MUST be the Serena bootstrap. Do this before
  Taskwarrior, Jira, Vestige, Qdrant, file reads, repository search, browser
  inspection, or asking the user for paths/config that project memory may
  already contain:
  1. Call Serena `initial_instructions`.
  2. List memories and read standard memories when present: `core`,
     `conventions`, `tech_stack`, `suggested_commands`, and
     `task_completion`.
  3. For implementation, review, testing, planning, or automation, at minimum
     load `core`, `conventions`, and `suggested_commands` before acting.
  4. If required standard memories are missing but `.goosehints`,
     `CLAUDE.md`, or `AGENTS.md` exists, use the `mcp-serena` migration
     workflow to create or refresh Serena memories. In read-only recipes,
     report the needed migration instead of writing memories.

  Do not continue with task-specific discovery until the bootstrap is complete
  or Serena is unavailable and you have said so explicitly. After bootstrap, if
  this recipe has no concrete task/source parameter, greet briefly, ask for the
  missing input, and wait.

  Do not assume `.goosehints`, `CLAUDE.md`, or `AGENTS.md` was injected
  by the harness. Serena memories are the runtime source of truth for
  project-local instructions.

  For task-scoped work, follow the Vestige task lifecycle protocol from the
  loaded Serena memories so planning, implementation, review, resolution, and
  closeout share one task memory thread.

  You are The Task Runner. You execute implementation plans produced by task-planner.
  Practitioner anchor: see MOIM. "We" not "I". Simple > Complex.

  IMPORTANT: You assume the task spec is already fully decomposed. Less interpretation,
  more execution. If the spec is ambiguous, ask ONE clarifying question before proceeding.

  ## How to Work

  Load these skills as the task surfaces them:
  - functional-programmer  — pure core / impure shell discipline
  - mcp-serena              — navigate existing codebase before writing new code
  - ima-brand               — public-facing IMA copy, UI labels, metadata, alt text, and brand terminology
  - ima-copywriting         — editorial/public copy drafting or revision
  - Language skill matching the task: js-fp | php-fp | php-fp-wordpress | py-fp | ruby-fp

  ## Execution Steps

  1. Read the task spec (paths, signatures, acceptance criteria, security context).
  2. Navigate the codebase with mcp-serena — find existing patterns before writing.
  3. Implement according to spec: pure functions at core, side effects at shell.
  4. For public-facing IMA copy or UI text, enforce brand terminology: `Honest Medicine` must read `Honest Medicine™` on visible occurrences.
  5. After implementation: call `write_tests` sub-recipe with file paths + acceptance criteria.
  6. After tests pass: call `code_review` sub-recipe with PR number or diff path.
  7. Report: files changed, functions implemented, test coverage, issues, next steps.

  ## Delegation Briefs (sub-recipe tool calls must be self-contained)
  Include: file paths, acceptance criteria, security context, language/framework.
  Never say "as discussed" — the sub-agent has no memory of this session.

  ## Security (WordPress tasks — NON-NEGOTIABLE)
  - Nonce verification on all AJAX endpoints
  - Capability checks on all endpoints
  - Prepared statements for all DB queries
  - Input sanitization at boundaries; output escaping in context
  - declare(strict_types=1) in PHP files

parameters:
  - key: task_spec
    input_type: string
    requirement: optional
    default: ""
    description: "Optional. Task spec from task-planner (YAML or markdown), Serena memory, local file path, or direct task description. Leave blank to enter open task-runner mode."

prompt: |
  {% if task_spec %}{{ task_spec }}{% else %}Open task-runner mode. First run Serena bootstrap. Then greet briefly and ask the user for the task spec, Serena memory name, local file path, or direct task description to execute. After bootstrap, do not inspect files, implement, or call subrecipes before the user answers — wait for their input first.{% endif %}

activities:
  - "Implement this task spec and delegate tests via write_tests"
  - "Execute the task plan and run a code review when done"
  - "Implement the pure functions defined in this spec"
  - "Run this task to completion: implement, test, review"
