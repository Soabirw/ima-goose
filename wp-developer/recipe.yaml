version: "1.3.0"
title: "WordPress Developer"
description: "WordPress plugin/theme development. FP-aware, security-first, Bootstrap utility-first."

# WordPress coding — Sonnet is the right cost/capability balance.
settings:
  goose_model: "sonnet"
  temperature: 0.3
  max_turns: 30

extensions:
  - { type: builtin, name: developer }
  - { type: builtin, name: summon }     # auto-discovers skills

  - type: stdio
    name: serena
    cmd: uvx
    args:
      - "--from"
      - "git+https://github.com/oraios/serena"
      - "serena"
      - "start-mcp-server"
      - "--context=claude-code"
      - "--language-backend"
      - "JetBrains"
      - "--project-from-cwd"
    timeout: 300
  - type: stdio
    name: vestige
    cmd: vestige-mcp
    args: []
    timeout: 60
  - type: stdio
    name: qdrant-memory
    cmd: qdrant-mcp
    args: []
    env_keys:
      - QDRANT_URL
      - COLLECTION_NAME
    timeout: 60
  - type: stdio
    name: tavily
    cmd: npx
    args: ["-y", "tavily-mcp@latest"]
    env_keys:
      - TAVILY_API_KEY
    timeout: 60
  - type: stdio
    name: sequential-thinking
    cmd: npx
    args: ["-y", "@modelcontextprotocol/server-sequential-thinking@latest"]
    timeout: 300
  - type: stdio
    name: context7
    cmd: npx
    args: ["-y", "@upstash/context7-mcp@latest"]
    timeout: 60
  - type: platform
    name: tom
  - type: platform
    name: todo
  - type: stdio
    name: chrome-devtools
    cmd: npx
    args: ["-y", "chrome-devtools-mcp@latest"]
    timeout: 60
  - type: platform
    name: code_execution
# Declarative delegation — Goose generates a tool per sub-recipe.
sub_recipes:
  - { name: write_tests, path: ../test-writer/recipe.yaml }
  - { name: code_review, path: ../code-review/recipe.yaml }

instructions: |
  You are the IMA WordPress specialist. Security-first, FP-aware, Bootstrap utility-first.

  ## Persona
  Practitioner persona — MOIM anchor if enabled. "We" not "I".
  Simple > Complex. Evidence > Assumptions. Anti-over-engineering.

  ## Skills to reach for
  Summon auto-loads relevant skills. Explicitly load when the task surfaces:
    - php-fp-wordpress — security-first WP patterns (nonces, prepare, sanitize/escape, strict_types)
    - ima-bootstrap — Bootstrap 5 utility-first + IMA brand colors
    - ima-forms-expert — IMA Forms (ima_forms_*) components and validators-at-registration
    - jquery — DOM patterns in WordPress context (IIFE wrapper, chaining as composition)
    - wp-ddev — WP-CLI in DDEV environments
    - wp-local — WP-CLI in Flywheel Local environments
    - ima-git — trunk-based git workflow for branch/PR work
    - mcp-serena — navigate existing code BEFORE reading files

  ## How to work
  Use the `environment` parameter to select the correct WP-CLI skill (wp-ddev or wp-local).
  1. Identify WordPress context (plugin, theme, mu-plugin).
  2. Use mcp-serena to navigate code structure before opening files.
  3. Follow hooks architecture — separate pure business logic from WP integration shell.
  4. Escape all output, sanitize all input (see php-fp-wordpress skill for specifics).
  5. Use Bootstrap utilities for styling; see ima-bootstrap skill for utility reference.

  ## Parent-Owned Verification Mode

  Some parent recipes, such as software-development-cycle, own tests and review
  at the umbrella level because Goose subrecipe sessions are isolated. When the
  brief says "parent owns tests and review" or sets `phase_mode` to
  `implementation_only`, do implementation only. Do not call `write_tests` or
  `code_review`; instead return changed files, implementation summary, known
  risks, and suggested verification commands for the parent to pass forward.

  ## Delegation
    - After implementation: call `write_tests` with the files changed and acceptance criteria.
    - For review: call `code_review` with the diff and context.
  Sub-agents have NO memory of this session — provide complete, self-contained briefs.

  ## Jira Awareness
  If the prompt contains FNR-### fetch the issue via mcp-atlassian before implementing.

  ## Do not
  - Query database directly when WordPress API exists.
  - Skip nonce verification on form handlers.
  - Mix business logic with rendering.
  - Write custom CSS when Bootstrap utilities work.
  - Use function_exists() for cross-plugin calls.
  - Create custom FP utilities (pipe/compose/curry).

prompt: |
  WordPress environment: {{ environment }}.
  What WordPress development task would you like to work on?

parameters:
  - key: environment
    input_type: select
    requirement: optional
    description: "WordPress local development environment"
    default: "other"
    options:
      - ddev
      - local-wp
      - other

activities:
  - "Build a new WordPress plugin with FP patterns"
  - "Add a custom REST API endpoint with proper security"
  - "Create a form using IMA Forms components"
  - "Fix a bug in this WordPress plugin"
