# Sakana API profile
# Uses Goose provider name "custom_sakana" configured as an OpenAI-compatible Responses endpoint.
# Sakana fugu accepts reasoning effort high and xhigh/max only.

tiers:
  high: fugu
  mid: fugu
  low: fugu

providers:
  high: custom_sakana
  mid: custom_sakana
  low: custom_sakana

env:
  high:
    GOOSE_THINKING_EFFORT: xhigh
  mid:
    GOOSE_THINKING_EFFORT: high
  low:
    GOOSE_THINKING_EFFORT: high
