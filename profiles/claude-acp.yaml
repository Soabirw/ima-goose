# claude-acp provider profile (default)
# Uses Claude friendly shortnames — provider resolves them itself.
# Identity mapping; installer makes no changes to recipes under this profile.

tiers:
  opus: opus
  sonnet: sonnet
  haiku: haiku

providers:
  opus: claude-acp
  sonnet: claude-acp
  haiku: claude-acp

# No per-recipe overrides needed under claude-acp.
overrides: {}
