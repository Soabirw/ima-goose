# Native ChatGPT Codex provider profile
# Uses Goose chatgpt_codex provider auth. Recipes must use the base GPT-5.5
# model ID; command aliases set GOOSE_THINKING_EFFORT at runtime.

tiers:
  high: gpt-5.5
  mid: gpt-5.5
  low: gpt-5.5

providers:
  high: chatgpt_codex
  mid: chatgpt_codex
  low: chatgpt_codex

env:
  high:
    GOOSE_THINKING_EFFORT: high
  mid:
    GOOSE_THINKING_EFFORT: medium
  low:
    GOOSE_THINKING_EFFORT: low
